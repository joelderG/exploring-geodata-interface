<div class="app-shell">
  <app-settings></app-settings>

  <div class="cutting-plane-layer" #cuttingPlaneLayer>
    <app-cutting-plane
      [zIndex]="zIndex"
      [coordinates]="coordinates"
      [cuttingPlaneOrientation]="cuttingPlaneOrientation"
      [classes]="classes">
    </app-cutting-plane>
    @if (!isCuttingPlaneFrozen) {
      <app-exploration-window
        [deepestPoint]="deepestPoint"
        [coordinates]="coordinates"
        [cuttingPlaneOrientation]="cuttingPlaneOrientation"
        [container]="cuttingPlaneLayer">
      </app-exploration-window>
    }
    <app-context-menu
      [point]="secondaryDeepPoint"
      [container]="cuttingPlaneLayer"
      [leftDisabled]="!contextMenuToggleEnabled"
      [rightDisabled]="!contextMenuToggleEnabled"
      (leftSelected)="onContextMenuLeftSelected()"
      (rightSelected)="onContextMenuRightSelected()">
    </app-context-menu>
  </div>

  <div class="volume-viewer-layer" [class.is-hidden]="!isVolumeViewerVisible">
    <app-volume-viewer
      [coordinates]="coordinates"
      [classes]="classes"
      [cuttingPlaneOrientation]="cuttingPlaneOrientation"
      [zIndex]="zIndex">
    </app-volume-viewer>
  </div>

  @if (isTouchpointsDebugVisible) {
    <div class="touchpoints-debug-layer">
      <app-touchpoints-debug></app-touchpoints-debug>
    </div>
  }

  <div class="class-selector-layer">
    <app-class-selector 
    [classes]="classes"
    [classesInfo]="classesInfo">
  </app-class-selector>
  </div>
</div>
