<div class="app-shell">
  <app-settings></app-settings>

  <div class="cutting-plane-layer">
    <app-cutting-plane
      [zIndex]="zIndex"
      [coordinates]="coordinates"
      [cuttingPlaneOrientation]="cuttingPlaneOrientation"
      [classes]="classes">
    </app-cutting-plane>
  </div>

  <div class="volume-viewer-layer" [class.is-hidden]="!isVolumeViewerVisible">
    <app-volume-viewer
      [coordinates]="coordinates"
      [classes]="classes"
      [cuttingPlaneOrientation]="cuttingPlaneOrientation"
      [zIndex]="zIndex">
    </app-volume-viewer>
  </div>

  @if (isTouchpointsDebugVisible) {
    <div class="touchpoints-debug-layer">
      <app-touchpoints-debug></app-touchpoints-debug>
    </div>
  }

  <div class="class-selector-layer">
    <app-class-selector 
    [classes]="classes"
    [classesInfo]="classesInfo">
  </app-class-selector>
  </div>
</div>
