<section class="settings" [class.is-visible]="isPanelVisible">
  <h2 class="settings__title">Settings</h2>

  <div class="interaction-streaming">
    <button type="button" class="interaction-streaming__toggle-button" (click)="toggleInteractionService()">
        Interaction-Service: {{ isInteractionStreamingActive ? 'On' : 'Off' }}
    </button>
    
    @switch (interactionConnectionState) {
        @case (0) {<div class="interaction-streaming__connection-status connected"></div>}
        @case (1) {<div class="interaction-streaming__connection-status connecting"></div>}
        @case (2) {<div class="interaction-streaming__connection-status disconnected"></div>}
        @case (3) {<div class="interaction-streaming__connection-status error"></div>}
        @default {<div class="interaction-streaming__connection-status"></div>}
    }
  </div>

  <div class="volume-viewer-visibility">
    <button
      type="button"
      class="volume-viewer-visibility__toggle-button"
      (click)="toggleVolumeViewerVisibilityMode()">
      Volume Viewer: {{ isVolumeViewerAlwaysVisible ? 'Always On' : 'Auto (3s)' }}
    </button>
  </div>

  <div class="touchpoints-debug-visibility">
    <button
      type="button"
      class="touchpoints-debug-visibility__toggle-button"
      (click)="toggleTouchpointsDebugVisibility()">
      TouchPoints Debug: {{ isTouchpointsDebugVisible ? 'On' : 'Off' }}
    </button>
  </div>

  <div class="cutting-plane">
    <div class="cutting-plane__label">Cutting plane</div>
    <div class="cutting-plane__buttons" role="group" aria-label="Cutting plane orientation">
      <button
        type="button"
        class="cutting-plane__button"
        [class.is-active]="cuttingPlaneOrientation === cuttingPlaneOrientationEnum.XY"
        (click)="setCuttingPlaneOrientation(cuttingPlaneOrientationEnum.XY)">
        XY
      </button>
      <button
        type="button"
        class="cutting-plane__button"
        [class.is-active]="cuttingPlaneOrientation === cuttingPlaneOrientationEnum.XZ"
        (click)="setCuttingPlaneOrientation(cuttingPlaneOrientationEnum.XZ)">
        XZ
      </button>
      <button
        type="button"
        class="cutting-plane__button"
        [class.is-active]="cuttingPlaneOrientation === cuttingPlaneOrientationEnum.YZ"
        (click)="setCuttingPlaneOrientation(cuttingPlaneOrientationEnum.YZ)">
        YZ
      </button>
    </div>
  </div>
</section>
