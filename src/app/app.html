<div class="app-shell">
  <app-settings></app-settings>

  <div class="cutting-plane-layer">
    <app-cutting-plane
      [zIndex]="zIndex"
      [xCoords]="xCoords"
      [yCoords]="yCoords"
      [zCoords]="zCoords"
      [cuttingPlaneOrientation]="cuttingPlaneOrientation"
      [classes]="classes">
    </app-cutting-plane>
  </div>

  <div class="volume-viewer-layer" [class.is-hidden]="!isVolumeViewerVisible">
    <app-volume-viewer
      [xCoords]="xCoords"
      [yCoords]="yCoords"
      [zCoords]="zCoords"
      [classes]="classes"
      [cuttingPlaneOrientation]="cuttingPlaneOrientation"
      [zIndex]="zIndex">
    </app-volume-viewer>
  </div>

  <div class="class-selector-layer">
    <app-class-selector 
    [classes]="classes"
    [classesInfo]="classesInfo">
  </app-class-selector>
  </div>
</div>
