<div class="viewer-panel">

      [yCoords]="yCoords"
      [zCoords]="zCoords"
      [classes]="classes"
      [zIndex]="zIndex">
  </app-volume-viewer>

  <app-class-selector [classes]="classes"></app-class-selector>
</div>

<app-cutting-plane 
    [zIndex]="zIndex"
    [xCoords]="xCoords"
    [yCoords]="yCoords"
    [classes]="classes">
</app-cutting-plane>
